<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>TaskFlow Pro - Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1>TaskFlow<span class="text-primary">Pro</span></h1>
            <p>Plataforma Académica UNIFRANZ</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label>Usuario Universitario</label>
                    <input type="text" name="usuario" class="form-control" placeholder="Ej: a.condori" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn">Iniciar Sesión</button>
            </form>

            <div style="margin-top: 15px;">
                <button class="btn" style="background-color: #333; color: #aaa; cursor: not-allowed;" disabled>
                    🌐 Continuar con Google (Próximamente)
                </button>
            </div>

            <p style="margin-top: 20px; font-size: 13px;">¿No tienes cuenta? <a href="/registro" class="text-primary"
                    style="text-decoration:none; font-weight:bold;">Regístrate aquí</a></p>
        </div>
    </div>
</body>

</html>
